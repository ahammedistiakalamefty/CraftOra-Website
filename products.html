<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftOra Products</title>
<link rel="stylesheet" href="products.css">
</head>

<body>

<header>
<h1>CraftOra</h1>
<nav>
<a href="./index.html">Home</a>
<a href="./about.html">About</a>
<a href="./about.html">Products</a>
<a href="./contact.html">Contact</a>
</nav>
</header>

<section>

<h2>Our Categories</h2>
<p>Click a category to see more items</p>

<div class="products-grid">

<div class="product" onclick="showCategory('necklace')">
<img src="./image/Necklece.jpeg">
<h3>Necklace</h3>
</div>

<div class="product" onclick="showCategory('earring')">
<img src="./image/Ear Ring.jpeg">
<h3>Earrings</h3>
</div>

<div class="product" onclick="showCategory('ring')">
<img src="./image/ring.jpeg">
<h3>Ring</h3>
</div>

<div class="product" onclick="showCategory('curi')">
<img src="./image/Hnad Made Curi.jpeg">
<h3>Curi</h3>
</div>

<div class="product" onclick="showCategory('glassjar')">
<img src="./image/glass jar.jpeg">
<h3>Glass Jar</h3>
</div>

</div>

</section>


<section>

<h2>More Items</h2>

<div id="categoryItems" class="products-grid"></div>

</section>


<footer>
<p>© 2026 CraftOra</p>
</footer>


<script>

const products = [

{category:'necklace',name:'Wood Necklace',price:'100 TK',img:'./image/wood necklece.jpeg'},
{category:'necklace',name:'Handmade Necklace',price:'300 TK',img:'./image/Necklece.jpeg'},

{category:'earring',name:'Artisan Earrings',price:'30 TK',img:'./image/Ear Ring.jpeg'},
{category:'earring',name:'Color Earrings',price:'40 TK',img:'./image/Earring.jpeg'},

{category:'ring',name:'Handmade Ring',price:'50 TK',img:'./image/ring.jpeg'},

{category:'curi',name:'Handmade Curi',price:'200 TK',img:'./image/Hnad Made Curi.jpeg'},

{category:'glassjar',name:'Handmade Glass Jar',price:'150 TK',img:'./image/glass jar.jpeg'}


];


function showCategory(cat){

const container=document.getElementById("categoryItems");
container.innerHTML="";

const filtered=products.filter(p=>p.category===cat);

filtered.forEach(p=>{

const message=`Hello, I want to order ${p.name} for ${p.price}`;
const waLink=`https://wa.me/8801330842078?text=${encodeURIComponent(message)}`;

container.innerHTML+=`

<div class="product">

<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>

<div class="order-buttons">

<a href="${waLink}" target="_blank" class="btn whatsapp">
Order via WhatsApp
</a>

<a href="https://www.facebook.com/profile.php?id=61585975903161"
target="_blank" class="btn facebook">
Order via Facebook
</a>

</div>

</div>

`;

});

container.scrollIntoView({behavior:"smooth"});

}

</script>

</body>
</html>
